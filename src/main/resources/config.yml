# 1MB-EndCrystals global config
# Stored in ~/plugins/1MB-EndCrystals/config.yml so multiple local Paper servers
# can share one copy of the settings when they run under the same user account.

protection:
  # Prevent end crystal explosions from breaking blocks.
  prevent-block-damage: true

  # Prevent direct player hits from breaking protected crystals.
  prevent-player-break: true

  # Prevent player-fired projectiles from breaking protected crystals.
  prevent-projectile-break: true

  # Allow players to break crystals in The End for dragon-fight style gameplay.
  allow-player-break-in-the-end: true

  # Clear explosion drops/yield when block damage prevention is active.
  clear-explosion-yield: true

debug:
  # Log each prevented crystal block-damage event to console.
  log-block-protection: false

  # Log blocked player crystal-break attempts to console.
  log-crystal-breaks: false

# These boolean config paths can be changed immediately with:
# /_endcrystals toggle <setting> [true|false]
live-toggles:
  - protection.prevent-block-damage
  - protection.prevent-player-break
  - protection.prevent-projectile-break
  - protection.allow-player-break-in-the-end
  - protection.clear-explosion-yield
  - debug.log-block-protection
  - debug.log-crystal-breaks

messages:
  prefix: "<gray>[<gold>1MB-EndCrystals</gold>]</gray> "
  no-permission: "<red>You do not have permission to do that.</red>"
  reloaded: "<green>Configuration reloaded from <white>%path%</white>.</green>"
  toggle-updated: "<green><white>%setting%</white> is now <white>%value%</white>.</green>"
  unknown-setting: "<red>Unknown toggle: <white>%setting%</white></red>"
  command-usage: "<yellow>Use <white>/_endcrystals debug</white>, <white>reload</white>, or <white>toggle &lt;setting&gt; [true|false]</white>.</yellow>"
  player-break-blocked: "<red>These end crystals are protected.</red>"
