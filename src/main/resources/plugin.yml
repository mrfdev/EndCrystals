name: ${pluginName}
version: ${pluginVersion}
main: com.mrfloris.endcrystals.EndCrystalsPlugin
api-version: "${declaredApiVersion}"
prefix: ${pluginName}
author: adrianwowk
authors: [mrfloris, the456gamer]
description: ${pluginDescription}
website: ${website}
commands:
  _endcrystals:
    description: End crystal protection admin commands
    usage: /_endcrystals <debug|reload|toggle>
permissions:
  onembendcrystals.admin:
    description: Grants every 1MB-EndCrystals admin command
    default: false
    children:
      onembendcrystals.debug: true
      onembendcrystals.reload: true
      onembendcrystals.toggle: true
  onembendcrystals.debug:
    description: Allows the debug subcommand
    default: false
  onembendcrystals.reload:
    description: Allows the reload subcommand
    default: false
  onembendcrystals.toggle:
    description: Allows live config toggles
    default: false
  onembendcrystals.break:
    description: Allows breaking protected end crystals
    default: false
